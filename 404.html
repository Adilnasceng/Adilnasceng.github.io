<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2H7TC3L9P7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2H7TC3L9P7');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Sayfa Bulunamadı | Adil NAS</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a28;
      --text-primary: #e8e8f0;
      --text-secondary: #a0a0b8;
      --text-muted: #666680;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
    }

    [data-theme="light"] {
      --bg-primary: #f8f8ff;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #555570;
      --text-muted: #9999bb;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .title {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .desc {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.4);
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 3rem;
    }

    /* Dark mode toggle */
    .theme-btn {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      background: var(--bg-card);
      border: 1px solid rgba(108,92,231,0.2);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-btn:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()" title="Tema değiştir">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="code">404</div>
  <div class="title">Sayfa Bulunamadı</div>
  <p class="desc">Aradığın sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir.</p>

  <a href="https://adilnas.dev" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Ana Sayfaya Dön
  </a>

  <p class="mono">adilnas.dev</p>

  <script>
    // Tema
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    // Ana siteden gelen tema tercihini oku
    const siteTheme = localStorage.getItem('theme');
    if (siteTheme) document.documentElement.setAttribute('data-theme', siteTheme);
  </script>
</body>
</html>
